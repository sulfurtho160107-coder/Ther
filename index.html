<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>WebAR GPS - Sai số 100m</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js GPS -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-location-only.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .infoBox {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="infoBox">
    📍 WebAR GPS đang hoạt động<br>
    Sai số cho phép: 100m<br>
    Tọa độ mục tiêu:<br>
    10°25'17.4"N 105°38'35.1"E
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="logarithmicDepthBuffer: true;"
    arjs="
      sourceType: webcam;
      videoTexture: true;
      debugUIEnabled: false;
    ">

    <!-- Camera GPS -->
    <a-camera
      gps-new-camera="
        gpsMinDistance: 5;
      ">
    </a-camera>

    <!-- Mô hình AR -->
    <a-entity
      id="birdModel"

      gps-new-entity-place="
        latitude: 10.421500;
        longitude: 105.643083;
      "

      obj-model="
        obj: url(./assets/bird.obj);
        mtl: url(./assets/bird.mtl);
      "

      scale="0.5 0.5 0.5"
      rotation="0 180 0"
      visible="false"

      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 10000;
        easing: linear;
      ">
    </a-entity>

    <!-- Ánh sáng -->
    <a-light
      type="ambient"
      intensity="1">
    </a-light>

  </a-scene>

  <script>
    // Tọa độ mục tiêu
    const targetLat = 10.421500;
    const targetLon = 105.643083;

    // Sai số cho phép: 100m
    const allowedDistance = 100;

    // Hàm tính khoảng cách GPS (mét)
    function calculateDistance(lat1, lon1, lat2, lon2) {

      const R = 6371000;

      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    // Kiểm tra vị trí người dùng
    navigator.geolocation.watchPosition(position => {

      const userLat = position.coords.latitude;
      const userLon = position.coords.longitude;

      const distance = calculateDistance(
        userLat,
        userLon,
        targetLat,
        targetLon
      );

      console.log("Khoảng cách:", distance);

      const model = document.querySelector("#birdModel");

      // Nếu trong phạm vi 100m -> hiện mô hình
      if (distance <= allowedDistance) {

        model.setAttribute("visible", true);

      } else {

        model.setAttribute("visible", false);

      }

    }, error => {

      console.error(error);

    }, {

      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 5000

    });
  </script>

</body>
</html>
