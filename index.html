<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>WebAR GPS - Mô Hình Chim</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>

  <!-- AR.js GPS -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-location-only.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .infoBox {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <div class="infoBox">
    📍 WebAR GPS đang hoạt động<br>
    Tọa độ mục tiêu:<br>
    10°25'17.4"N 105°38'35.1"E
  </div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="logarithmicDepthBuffer: true;"
    arjs="
      sourceType: webcam;
      videoTexture: true;
      debugUIEnabled: false;
    ">

    <!-- Camera GPS -->
    <a-camera
      gps-new-camera="
        gpsMinDistance: 5;
      ">
    </a-camera>

    <!-- Mô hình chim tại vị trí GPS -->
    <a-entity
      gps-new-entity-place="
        latitude: 10.421500;
        longitude: 105.643083;
      "
      obj-model="
        obj: url(./assets/bird.obj);
        mtl: url(./assets/bird.mtl);
      "
      scale="0.5 0.5 0.5"
      rotation="0 180 0"
      animation="
        property: rotation;
        to: 0 360 0;
        loop: true;
        dur: 10000;
        easing: linear;
      ">
    </a-entity>

    <!-- Ánh sáng -->
    <a-light
      type="ambient"
      color="#ffffff"
      intensity="1">
    </a-light>

    <a-light
      type="directional"
      position="1 1 0">
    </a-light>

  </a-scene>

</body>
</html>
