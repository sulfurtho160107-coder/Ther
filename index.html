<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR Mô Hình - AR.js GPS</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js'></script>
    <script type='text/javascript' src='https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js'></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene 
      vr-mode-ui="enabled: false" 
      embedded 
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="model-obj" src="./assets/10012_crab_v2_iterations-1.obj"></a-asset-item>
        <a-asset-item id="model-mtl" src="./assets/10012_crab_v2_iterations-1.mtl"></a-asset-item>
      </a-assets>
      
      <a-entity gps-entity-place="latitude: 10.4602; longitude: 105.6375;">
        <a-obj-model 
          src="#model-obj" 
          mtl="#model-mtl" 
          position="0 0 0" 
          scale="0.05 0.05 0.05" 
          rotation="-90 0 0">
        </a-obj-model>
      </a-entity>
      
      <a-camera gps-camera rotation-reader></a-camera>
      
    </a-scene>
  </body>
</html>
